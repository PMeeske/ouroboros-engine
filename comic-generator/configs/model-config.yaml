# Model Configuration — Comic Strip Generator
#
# Paths are relative to C:\ComfyUI\models\ unless absolute.
# All models are SD 1.5 based to stay within ROG Ally VRAM limits.

# === Base Models ===
# Use ONE of these as the checkpoint in the workflow.
base_models:
  # Primary recommendation: Anime/manga ink style
  - name: "Anything V5 Ink"
    path: "checkpoints/anything-v5-PrtRE.safetensors"
    type: safetensors
    architecture: sd15
    vram_usage: "~4.0 GB (fp16)"
    style: "Anime, manga, ink, clean lines"
    source: "https://huggingface.co/stablediffusionapi/anything-v5"
    notes: "Best for black-and-white manga panels. Strong lineart output."

  # Alternative: More stylized anime aesthetic
  - name: "Counterfeit V3.0"
    path: "checkpoints/CounterfeitV30_v30.safetensors"
    type: safetensors
    architecture: sd15
    vram_usage: "~4.0 GB (fp16)"
    style: "Stylized anime, vivid, detailed"
    source: "https://huggingface.co/gsdf/Counterfeit-V3.0"
    notes: "Better for color comic panels. More detail in backgrounds."

# === ControlNet Models ===
controlnet:
  - name: "Lineart SD 1.5"
    path: "controlnet/control_v11p_sd15_lineart.pth"
    type: pth
    vram_usage: "~700 MB additional"
    purpose: "Guide generation with sketch/lineart input"
    source: "https://huggingface.co/lllyasviel/ControlNet-v1-1"
    settings:
      strength: 0.55          # Lower = more creative freedom
      start_percent: 0.0
      end_percent: 0.85       # Release control near end for natural details
    notes: >
      Adds ~700MB to VRAM. Total with base model: ~4.7GB.
      Reduce resolution to 384x384 if OOM occurs with ControlNet active.

# === Upscale Models ===
upscale:
  - name: "Real-ESRGAN x2 Anime"
    path: "upscale_models/RealESRGAN_x2plus_anime.pth"
    type: pth
    vram_usage: "~50 MB"
    scale_factor: 2
    source: "https://huggingface.co/ai-forever/Real-ESRGAN"
    notes: "Lightweight anime-optimized upscaler. 512→1024 in ~2 sec."

# === VAE ===
vae:
  # The base models include a built-in VAE.
  # Only load a separate VAE if you get black/corrupted images.
  - name: "sd-vae-ft-mse (fallback)"
    path: "vae/vae-ft-mse-840000-ema-pruned.safetensors"
    source: "https://huggingface.co/stabilityai/sd-vae-ft-mse"
    notes: "Use only if the built-in VAE produces black images."

# === ONNX Variants ===
# Pre-exported ONNX models for ONNX Runtime DirectML inference.
# Export with: python scripts/export-onnx.py
onnx:
  - name: "Anything V5 ONNX (fp16)"
    path: "onnx/anything-v5/"
    dtype: float16
    notes: >
      Use if ComfyUI DirectML has issues with safetensors loading.
      ONNX Runtime DirectML can be more stable than PyTorch DirectML
      for some operations.

# === Models to AVOID on ROG Ally ===
# These will cause OOM or extremely slow generation:
avoid:
  - "SDXL 1.0 (requires >10GB VRAM)"
  - "SDXL Turbo (still >6GB, marginal fit)"
  - "SD 2.1 768 (768px base resolution uses more VRAM than SD 1.5)"
  - "Any model >4GB checkpoint size"
  - "ControlNet XL variants"
  - "IP-Adapter (adds ~2.5GB)"
