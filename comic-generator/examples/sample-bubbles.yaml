# Speech Bubble Definitions — Example for 3-panel strip
#
# Used with: python scripts/assemble-strip.py --bubbles sample-bubbles.yaml
#
# Each entry specifies:
#   panel:     Panel number (1-indexed)
#   x, y:      Position of bubble tail tip (relative to panel top-left)
#   text:      Dialogue text
#   max_width: Maximum bubble width in pixels (optional, default 180)

- panel: 1
  x: 380
  y: 120
  text: "What a beautiful morning!"
  max_width: 180

- panel: 2
  x: 300
  y: 100
  text: "Wait... is that the time?!"
  max_width: 200

- panel: 3
  x: 256
  y: 80
  text: "I'm going to be LATE!"
  max_width: 160
