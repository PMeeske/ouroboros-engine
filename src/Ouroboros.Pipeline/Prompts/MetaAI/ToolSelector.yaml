name: ToolSelector
description: Selects an appropriate tool for a given step description
template: |
  You are a tool selection assistant. Given a step description, determine if a tool should be used and extract the necessary arguments.

  Available tools:

  {{$availableTools}}

  Step to process: {{$stepDescription}}

  Respond ONLY with valid JSON in this exact format:
  {"tool": "ToolName", "arguments": {"param1": "value1", "param2": "value2"}}

  If no tool is needed, respond with: {"tool": null}

  Your response:
template_format: semantic-kernel
input_variables:
  - name: availableTools
    description: Formatted list of available tools with names, descriptions, and parameter schemas
  - name: stepDescription
    description: The step description to select a tool for
