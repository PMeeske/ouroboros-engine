# CI pipeline for ouroboros-engine
# Triggers on push to main and pull requests

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  repository_dispatch:
    types: [dependency-updated]
  workflow_dispatch:

concurrency:
  # Use dispatch source for grouping when triggered by repository_dispatch,
  # otherwise use git ref. This allows multiple dispatch events from different
  # sources to run concurrently while still preventing duplicate runs per source.
  group: ci-${{ github.event_name == 'repository_dispatch' && format('dispatch-{0}', github.event.client_payload.source_repo) || github.ref }}
  cancel-in-progress: true

# Deny all permissions by default; individual jobs grant only what they need
permissions: {}

jobs:
  build:
    name: Build
    uses: PMeeske/ouroboros-build/.github/workflows/_reusable-dotnet-build.yml@develop
    with:
      projects: >-
        src/Ouroboros.Agent/Ouroboros.Agent.csproj
        src/Ouroboros.Pipeline/Ouroboros.Pipeline.csproj
        src/Ouroboros.Providers/Ouroboros.Providers.csproj
        src/Ouroboros.Network/Ouroboros.Network.csproj

  test:
    name: Test
    needs: build
    uses: PMeeske/ouroboros-build/.github/workflows/_reusable-dotnet-test.yml@develop
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      job-identifier: "test"
      test-projects: >-
        tests/Ouroboros.Agent.Tests/Ouroboros.Agent.Tests.csproj
        tests/Ouroboros.Pipeline.Tests/Ouroboros.Pipeline.Tests.csproj
        tests/Ouroboros.Providers.Tests/Ouroboros.Providers.Tests.csproj
        tests/Ouroboros.Network.Tests/Ouroboros.Network.Tests.csproj
        tests/Ouroboros.SimpleModel.Tests/Ouroboros.SimpleModel.Tests.csproj
      build-projects: >-
        src/Ouroboros.Agent/Ouroboros.Agent.csproj
        src/Ouroboros.Pipeline/Ouroboros.Pipeline.csproj
        src/Ouroboros.Providers/Ouroboros.Providers.csproj
        src/Ouroboros.Network/Ouroboros.Network.csproj
      coverage-threshold: 80
      runsettings-path: libs/.build/build/coverlet.runsettings

  bdd:
    name: BDD Tests
    needs: build
    uses: PMeeske/ouroboros-build/.github/workflows/_reusable-dotnet-test.yml@develop
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      job-identifier: "bdd"
      test-projects: tests/Ouroboros.Engine.BDD/Ouroboros.Engine.BDD.csproj
      build-projects: >-
        src/Ouroboros.Agent/Ouroboros.Agent.csproj
        src/Ouroboros.Pipeline/Ouroboros.Pipeline.csproj
        src/Ouroboros.Providers/Ouroboros.Providers.csproj
      coverage-threshold: 0

  coverage-badge:
    name: Coverage Badge
    needs: [test]
    if: always() && needs.test.result == 'success'
    uses: PMeeske/ouroboros-build/.github/workflows/_reusable-coverage-badge.yml@develop
    permissions:
      contents: write
    with:
      coverage-percentage: ${{ needs.test.outputs.coverage-percentage }}
      tests-passed: ${{ needs.test.outputs.tests-passed }}
      tests-failed: ${{ needs.test.outputs.tests-failed }}
      badge-filename: "ouroboros-engine-coverage.json"
      tests-badge-filename: "ouroboros-engine-tests.json"
      repo-name: "engine coverage"

  claude-review:
    name: Claude Code Review
    if: github.event_name == 'pull_request'
    uses: PMeeske/ouroboros-build/.github/workflows/_reusable-claude-review.yml@develop
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
